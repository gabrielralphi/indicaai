<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indica Aí — Profissionais do Condomínio Cidades Portuguesas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  /* ─── CONFIG ─────────────────────────────────────────── */
  /* 👇 COLE AQUI A URL DO SEU GOOGLE APPS SCRIPT          */
  /* Veja o arquivo apps-script.js para instruções         */

  :root {
    --api: "https://script.google.com/macros/s/AKfycbz9oxehyXFQx-T9SZ29PaBQnyawt0daVhou0XjOeNW1zbYxKp4QvG1k3EYBcVFS2R9G/exec";

    --bg: #0f0e0d;
    --surface: #1a1917;
    --card: #211f1d;
    --border: #2e2b28;
    --accent: #e8c547;
    --accent2: #e07a3a;
    --text: #f0ede8;
    --muted: #7a7570;
    --green: #5dbf82;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── HEADER ─────────────────────────────────────────── */
  header {
    padding: 28px 24px 0;
    max-width: 780px;
    margin: 0 auto;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }

  .hero {
    margin-top: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 6vw, 44px);
    line-height: 1.1;
    color: var(--text);
  }

  .hero h1 span { color: var(--accent); }

  .hero p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    max-width: 460px;
  }

  .hero-actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .15s;
  }
  .btn:active { transform: scale(.97); }

  .btn-primary {
    background: var(--accent);
    color: #111;
  }
  .btn-primary:hover { opacity: .88; }

  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── FILTROS ─────────────────────────────────────────── */
  .controls {
    max-width: 780px;
    margin: 24px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 9px 14px 9px 34px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .filter-chips {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }

  .chip {
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); color: #111; border-color: var(--accent); }

  /* ─── GRID ────────────────────────────────────────────── */
  .grid {
    max-width: 780px;
    margin: 24px auto 0;
    padding: 0 24px 80px;
    display: grid;
    gap: 14px;
  }

  /* ─── CARD ────────────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 14px;
    transition: border-color .15s, transform .15s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity .15s;
  }
  .card:hover { border-color: #3e3a35; transform: translateY(-1px); }
  .card:hover::before { opacity: 1; }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    grid-column: 1;
  }

  .card-rating {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-start;
    gap: 3px;
  }

  .stars {
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 1px;
  }

  .rating-count {
    font-size: 11px;
    color: var(--muted);
  }

  .card-ramo {
    grid-column: 1;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .tag {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .card-meta {
    grid-column: 1 / -1;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--muted);
  }

  .meta-item.phone { color: var(--green); font-weight: 500; }
  .meta-item.price { color: var(--accent2); font-weight: 500; }

  .card-comment {
    grid-column: 1 / -1;
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.5;
  }
  .card-comment::before { content: '"'; }
  .card-comment::after { content: '"'; }

  /* ─── EMPTY ───────────────────────────────────────────── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .emoji { font-size: 40px; display: block; margin-bottom: 12px; }

  /* ─── LOADING ─────────────────────────────────────────── */
  .skeleton {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .skel-line {
    height: 12px;
    border-radius: 6px;
    background: var(--border);
    margin-bottom: 10px;
  }
  .skel-line.short { width: 40%; }
  .skel-line.medium { width: 65%; }
  .skel-line.full { width: 100%; }
  @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

  /* ─── MODAL ───────────────────────────────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.72);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 780px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px 24px 40px;
    transform: translateY(40px);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
  }

  .close-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: color .15s;
  }
  .close-btn:hover { color: var(--text); }

  .form-grid { display: grid; gap: 14px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .field input,
  .field select,
  .field textarea {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  .field select option { background: var(--card); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus,
  .field select:focus,
  .field textarea:focus { border-color: var(--accent); }

  .star-pick {
    display: flex;
    gap: 6px;
    font-size: 24px;
    cursor: pointer;
  }
  .star-pick span { color: var(--border); transition: color .1s; }
  .star-pick span.on { color: var(--accent); }

  .form-submit {
    margin-top: 8px;
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    background: var(--accent);
    color: #111;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: .05em;
    border: none;
    cursor: pointer;
    transition: opacity .15s;
  }
  .form-submit:hover { opacity: .88; }
  .form-submit:disabled { opacity: .5; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #111;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 500;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all .3s;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #e05a5a; color: #fff; }

  /* ─── DETAIL MODAL ────────────────────────────────────── */
  .detail-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 24px;
    margin-bottom: 4px;
  }
  .detail-ramo { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .detail-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    min-width: 100px;
  }
  .stat-box .stat-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--accent);
  }
  .stat-box .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .detail-comment {
    background: var(--card);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 20px;
  }
  .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-wpp {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 20px;
    border-radius: 999px;
    background: #25D366;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: opacity .15s;
  }
  .btn-wpp:hover { opacity: .88; }
  .reviews-section { margin-top: 24px; }
  .reviews-section h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .review-item {
    border-top: 1px solid var(--border);
    padding: 12px 0;
    font-size: 13px;
    color: var(--muted);
  }
  .review-stars { color: var(--accent); margin-bottom: 4px; font-size: 12px; }

  /* ─── COUNTER ─────────────────────────────────────────── */
  .count-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--muted);
    margin-left: 8px;
  }

  /* ─── CONFIG WARNING ──────────────────────────────────── */
  .config-banner {
    background: #2a200d;
    border: 1px solid var(--accent2);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin: 16px 24px 0;
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
    font-size: 13px;
    color: var(--accent2);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .config-banner strong { display: block; margin-bottom: 4px; }
  .config-banner code {
    background: rgba(255,255,255,.08);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 12px;
  }
</style>
</head>
<body>

<!-- ── CONFIG ────────────────────────────────── -->
<script>
  // 👇 ALTERE AQUI antes de publicar
  const APPS_SCRIPT_URL = "COLE_SUA_URL_AQUI";
  const CONDO_NOME = "Cidades Portuguesas";

  const RAMOS = [
    "Elétrica","Hidráulica","Pintura","Marcenaria","Marmoraria",
    "Ar-condicionado","Chaveiro","Limpeza","Faxineira","Higienização","Jardinagem","Informática",
    "Dedetização","Mudança","Serralheria","Gesseiro","Baba","Outros"
  ];
</script>

<header>
  <div class="logo"><span class="logo-dot"></span> Indica Aí</div>
  <div class="hero">
    <h1>Profissionais do<br><span id="condoNome"></span></h1>
    <p>Indicações de moradores, para moradores. Encontre quem já foi testado aqui dentro.</p>
    <div class="hero-actions">
      <button class="btn btn-primary" onclick="openModal('add')">＋ Indicar profissional</button>
      <button class="btn btn-ghost" onclick="openModal('rate')">⭐ Avaliar alguém</button>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por nome ou ramo…" oninput="render()">
  </div>
  <div class="filter-chips" id="chips"></div>
</div>

<div class="grid" id="grid">
  <!-- skeletons -->
  <div class="skeleton"><div class="skel-line medium"></div><div class="skel-line short"></div><div class="skel-line full"></div></div>
  <div class="skeleton"><div class="skel-line medium"></div><div class="skel-line short"></div><div class="skel-line full"></div></div>
  <div class="skeleton"><div class="skel-line medium"></div><div class="skel-line short"></div><div class="skel-line full"></div></div>
</div>

<!-- ── MODAL CADASTRO / AVALIAÇÃO ────────────── -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalContent"></div>
</div>

<!-- ── TOAST ──────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
document.getElementById('condoNome').textContent = CONDO_NOME;

let allProfissionais = [];
let selectedRamo = 'Todos';
let currentMode = 'add';
let selectedStars = 0;
let currentProfId = null;

// ─── CHIPS ──────────────────────────────────────────────
function buildChips() {
  const container = document.getElementById('chips');
  const todos = ['Todos', ...RAMOS];
  container.innerHTML = todos.map(r =>
    `<div class="chip ${r === selectedRamo ? 'active' : ''}" onclick="setRamo('${r}')">${r}</div>`
  ).join('');
}

function setRamo(r) {
  selectedRamo = r;
  buildChips();
  render();
}

// ─── FETCH ──────────────────────────────────────────────
async function loadData() {
  if (APPS_SCRIPT_URL === "COLE_SUA_URL_AQUI") {
    document.getElementById('configBanner').style.display = 'flex';
    allProfissionais = getDemoData();
    render();
    return;
  }
  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?action=list`);
    const d = await r.json();
    allProfissionais = d.profissionais || [];
    render();
  } catch(e) {
    showToast('Erro ao carregar dados', true);
    allProfissionais = [];
    render();
  }
}

// ─── RENDER ─────────────────────────────────────────────
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = allProfissionais;
  if (selectedRamo !== 'Todos') list = list.filter(p => p.ramo === selectedRamo);
  if (q) list = list.filter(p =>
    p.nome.toLowerCase().includes(q) ||
    p.ramo.toLowerCase().includes(q) ||
    (p.comentario||'').toLowerCase().includes(q)
  );

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><span class="emoji">🔍</span>Nenhum profissional encontrado.</div>`;
    return;
  }
  grid.innerHTML = list.map(p => cardHTML(p)).join('');
}

function stars(n, total=5) {
  const full = Math.round(n);
  return '★'.repeat(full) + '☆'.repeat(total - full);
}

function cardHTML(p) {
  const avg = p.avgNota ? parseFloat(p.avgNota).toFixed(1) : '—';
  const count = p.totalAvaliacoes || 0;
  return `
  <div class="card" onclick="openDetail('${p.id}')">
    <div class="card-name">${esc(p.nome)}</div>
    <div class="card-rating">
      <div class="stars">${p.avgNota ? stars(p.avgNota) : '☆☆☆☆☆'}</div>
      <div class="rating-count">${count} avaliação${count !== 1 ? 'ões' : ''}</div>
    </div>
    <div class="card-ramo">
      <span class="tag">${esc(p.ramo)}</span>
    </div>
    <div class="card-meta">
      ${p.telefone ? `<span class="meta-item phone">📱 ${esc(p.telefone)}</span>` : ''}
      ${p.valor ? `<span class="meta-item price">💵 ${esc(p.valor)}</span>` : ''}
    </div>
    ${p.comentario ? `<div class="card-comment">${esc(p.comentario)}</div>` : ''}
  </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── MODAL ──────────────────────────────────────────────
function openModal(mode, profId) {
  currentMode = mode;
  currentProfId = profId || null;
  selectedStars = 0;
  const modal = document.getElementById('modalContent');

  if (mode === 'add') {
    modal.innerHTML = addFormHTML();
    buildRamoSelect();
  } else if (mode === 'rate') {
    modal.innerHTML = rateFormHTML();
    buildProfSelect();
    buildStarPick('starPick', v => selectedStars = v);
  }

  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target.id === 'overlay') closeModal();
}

function addFormHTML() {
  return `
  <div class="modal-header">
    <div class="modal-title">Indicar profissional</div>
    <button class="close-btn" onclick="closeModal()">×</button>
  </div>
  <div class="form-grid">
    <div class="form-row">
      <div class="field"><label>Nome *</label><input id="f_nome" placeholder="João Elétrica" /></div>
      <div class="field"><label>Ramo *</label><select id="f_ramo"></select></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Telefone / WhatsApp *</label><input id="f_tel" placeholder="(48) 99999-9999" /></div>
      <div class="field"><label>Valor cobrado</label><input id="f_valor" placeholder="R$ 80/hora ou combinado" /></div>
    </div>
    <div class="field"><label>Comentário</label><textarea id="f_comentario" placeholder="Fez um ótimo serviço, pontual e caprichoso…"></textarea></div>
    <div class="field"><label>Sua avaliação</label><div class="star-pick" id="starPickAdd"></div></div>
    <button class="form-submit" onclick="submitAdd()">Cadastrar profissional</button>
  </div>`;
}

function rateFormHTML() {
  return `
  <div class="modal-header">
    <div class="modal-title">Avaliar profissional</div>
    <button class="close-btn" onclick="closeModal()">×</button>
  </div>
  <div class="form-grid">
    <div class="field"><label>Profissional *</label><select id="f_profId"></select></div>
    <div class="field"><label>Nota *</label><div class="star-pick" id="starPick"></div></div>
    <div class="field"><label>Comentário</label><textarea id="f_comentario2" placeholder="O que achou do serviço?"></textarea></div>
    <button class="form-submit" onclick="submitRate()">Enviar avaliação</button>
  </div>`;
}

function buildRamoSelect() {
  const s = document.getElementById('f_ramo');
  if (!s) return;
  s.innerHTML = RAMOS.map(r => `<option value="${r}">${r}</option>`).join('');
  buildStarPick('starPickAdd', v => selectedStars = v);
}

function buildProfSelect() {
  const s = document.getElementById('f_profId');
  if (!s) return;
  s.innerHTML = `<option value="">Selecione…</option>` +
    allProfissionais.map(p => `<option value="${p.id}">${esc(p.nome)} — ${esc(p.ramo)}</option>`).join('');
  if (currentProfId) s.value = currentProfId;
}

function buildStarPick(containerId, cb) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = [1,2,3,4,5].map(i =>
    `<span data-v="${i}" onclick="pickStar(this,'${containerId}',${i})" title="${i} estrela${i>1?'s':''}">☆</span>`
  ).join('');
}

function pickStar(el, containerId, v) {
  selectedStars = v;
  const container = document.getElementById(containerId);
  container.querySelectorAll('span').forEach(s => {
    s.textContent = parseInt(s.dataset.v) <= v ? '★' : '☆';
    s.classList.toggle('on', parseInt(s.dataset.v) <= v);
  });
}

// ─── SUBMIT ─────────────────────────────────────────────
async function submitAdd() {
  const nome = document.getElementById('f_nome')?.value.trim();
  const ramo = document.getElementById('f_ramo')?.value;
  const tel  = document.getElementById('f_tel')?.value.trim();
  if (!nome || !tel) { showToast('Preencha nome e telefone', true); return; }

  const btn = document.querySelector('.form-submit');
  btn.disabled = true; btn.textContent = 'Enviando…';

  const body = {
    action: 'add',
    nome, ramo, telefone: tel,
    valor: document.getElementById('f_valor')?.value.trim() || '',
    comentario: document.getElementById('f_comentario')?.value.trim() || '',
    nota: selectedStars || ''
  };

  await postData(body);
}

async function submitRate() {
  const profId = document.getElementById('f_profId')?.value;
  if (!profId) { showToast('Selecione um profissional', true); return; }
  if (!selectedStars) { showToast('Selecione a nota', true); return; }

  const btn = document.querySelector('.form-submit');
  btn.disabled = true; btn.textContent = 'Enviando…';

  const body = {
    action: 'rate',
    profId,
    nota: selectedStars,
    comentario: document.getElementById('f_comentario2')?.value.trim() || ''
  };

  await postData(body);
}

async function postData(body) {
  if (APPS_SCRIPT_URL === "COLE_SUA_URL_AQUI") {
    showToast('Configure a URL do Apps Script primeiro!', true);
    document.querySelector('.form-submit').disabled = false;
    document.querySelector('.form-submit').textContent = 'Tentar novamente';
    return;
  }
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    closeModal();
    showToast('✓ Enviado com sucesso!');
    setTimeout(loadData, 800);
  } catch(e) {
    showToast('Erro ao enviar. Tente novamente.', true);
    const btn = document.querySelector('.form-submit');
    if (btn) { btn.disabled = false; btn.textContent = 'Tentar novamente'; }
  }
}

// ─── TOAST ──────────────────────────────────────────────
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2800);
}
